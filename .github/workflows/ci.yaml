name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tests:
    name: PHP ${{ matrix.php }} - Symfony ${{ matrix.symfony }}.* - ${{ matrix.dependencies }}
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20
    
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.4'
            symfony: '7.4'
            dependencies: 'highest'
            composer_args: '--prefer-stable --optimize-autoloader'
          - php: '8.4'
            symfony: '7.4'
            dependencies: 'lowest'
            composer_args: '--prefer-lowest --prefer-stable --optimize-autoloader'
          - php: '8.4'
            symfony: '8.0'
            dependencies: 'highest'
            composer_args: '--prefer-stable --optimize-autoloader'
          - php: '8.4'
            symfony: '8.0'
            dependencies: 'lowest'
            composer_args: '--prefer-lowest --prefer-stable --optimize-autoloader'

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
          coverage: pcov
          ini-values: memory_limit=-1

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.symfony }}-${{ matrix.dependencies }}-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install Symfony Flex
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-interaction symfony/flex

      - name: Configure Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}.*"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress ${{ matrix.composer_args }}

      - name: Run tests with coverage
        run: vendor/bin/phpunit --coverage-clover clover.xml

      - name: Verify coverage report was generated
        run: |
          if [ ! -f clover.xml ]; then
            echo "ERROR: Coverage report (clover.xml) was not generated!"
            exit 1
          fi
          
          echo "Coverage report generated successfully"
          
          if ! grep -q '<file name=' clover.xml; then
            echo "WARNING: Coverage report appears to be empty (no files found)"
            exit 1
          fi
          
          FILE_COUNT=$(grep -c '<file name=' clover.xml || echo "0")
          echo "Files in coverage report: $FILE_COUNT"
          echo "Report size: $(wc -c < clover.xml) bytes"

      - name: Upload coverage to Codacy
        if: |
          matrix.symfony == '7.4' &&
          matrix.dependencies == 'highest' &&
          (
            github.event_name == 'push' ||
            github.event_name == 'workflow_dispatch' ||
            (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
          )
        continue-on-error: true
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: clover.xml

  functional-mysql:
    name: Functional MySQL - Symfony ${{ matrix.symfony }}.*
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        symfony: ['7.4', '8.0']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: audit_trail_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      AUDIT_TRAIL_TEST_DATABASE_URL: mysql://root:root@127.0.0.1:3306/audit_trail_test?serverVersion=8.0.36&charset=utf8mb4

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1
          extensions: pdo_mysql, pdo_pgsql, sqlite3

      - name: Get composer cache directory
        id: composer-cache-mysql
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.composer-cache-mysql.outputs.dir }}
          key: ${{ runner.os }}-composer-functional-mysql-${{ matrix.symfony }}-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-functional-mysql-

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install Symfony Flex
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-interaction symfony/flex

      - name: Configure Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}.*"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --prefer-stable --optimize-autoloader

      - name: Run functional suite on MySQL
        run: vendor/bin/phpunit --testsuite Functional

  functional-postgresql:
    name: Functional PostgreSQL - Symfony ${{ matrix.symfony }}.*
    runs-on: ubuntu-latest
    needs: [quality]
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        symfony: ['7.4', '8.0']

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: audit_trail_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d audit_trail_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      AUDIT_TRAIL_TEST_DATABASE_URL: pgsql://postgres:postgres@127.0.0.1:5432/audit_trail_test?serverVersion=16&charset=utf8

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1
          extensions: pdo_mysql, pdo_pgsql, sqlite3

      - name: Get composer cache directory
        id: composer-cache-postgresql
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.composer-cache-postgresql.outputs.dir }}
          key: ${{ runner.os }}-composer-functional-postgresql-${{ matrix.symfony }}-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-functional-postgresql-

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install Symfony Flex
        run: |
          composer global config --no-plugins allow-plugins.symfony/flex true
          composer global require --no-interaction symfony/flex

      - name: Configure Symfony version
        run: composer config extra.symfony.require "${{ matrix.symfony }}.*"

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress --prefer-stable --optimize-autoloader

      - name: Run functional suite on PostgreSQL
        run: vendor/bin/phpunit --testsuite Functional

  quality:
    name: Quality Checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1
        with:
          php-version: 8.4
          tools: composer:v2
          coverage: none
          ini-values: memory_limit=-1

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-quality-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Validate composer.json and composer.lock
        run: composer validate --strict

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress --optimize-autoloader

      - name: Run PHPStan
        run: vendor/bin/phpstan analyse --error-format=github

      - name: Run PHP-CS-Fixer
        run: vendor/bin/php-cs-fixer fix --dry-run --diff --format=txt

      - name: Run security audit
        run: composer audit --locked

  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [quality, tests, functional-mysql, functional-postgresql]
    if: always()
    
    steps:
      - name: Check all jobs status
        run: |
          if [ "${{ needs.quality.result }}" != "success" ] || \
             [ "${{ needs.tests.result }}" != "success" ] || \
             [ "${{ needs.functional-mysql.result }}" != "success" ] || \
             [ "${{ needs.functional-postgresql.result }}" != "success" ]; then
            echo "CI failed"
            echo "Quality: ${{ needs.quality.result }}"
            echo "Tests: ${{ needs.tests.result }}"
            echo "Functional MySQL: ${{ needs.functional-mysql.result }}"
            echo "Functional PostgreSQL: ${{ needs.functional-postgresql.result }}"
            exit 1
          fi
          echo "All CI checks passed successfully"
